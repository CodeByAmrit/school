name: Docker Image CI

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "MAJOR_MINOR=${VERSION%.*}" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/student-tracker:latest
            ${{ steps.version.outputs.IS_TAG == 'true' && format('{0}/student-tracker:{1}', secrets.DOCKERHUB_USERNAME, steps.version.outputs.VERSION) || '' }}
            ${{ steps.version.outputs.IS_TAG == 'true' && format('{0}/student-tracker:{1}', secrets.DOCKERHUB_USERNAME, steps.version.outputs.MAJOR_MINOR) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
