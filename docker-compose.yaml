services:
  student-tracker:
    image: codebyamrit/student-tracker:${APP_VERSION}
    container_name: student-tracker
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    networks:
      - proxy
    expose:
      - "5000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.student-tracker.rule=Host(`edu.amritsharma.dev`)"
      - "traefik.http.routers.student-tracker.entrypoints=websecure"
      - "traefik.http.routers.student-tracker.tls.certresolver=letsencrypt"
      - "traefik.http.services.student-tracker.loadbalancer.server.port=5000"


